version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: iacm_postgres
    environment:
      POSTGRES_DB: iacm_db
      POSTGRES_USER: iacm_user
      POSTGRES_PASSWORD: iacm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iacm_user -d iacm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iacm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iacm_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://iacm_user:iacm_password@db:5432/iacm_db
      - DATABASE_URL_SYNC=postgresql://iacm_user:iacm_password@db:5432/iacm_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production-super-secret-key-32chars
      - JWT_SECRET_KEY=change-this-jwt-secret-also-very-secret-32chars
      - DEBUG=true
      - ALLOWED_HOSTS=["http://localhost:3000","http://localhost:8080","http://localhost"]
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
